kind = "web"
previewPath = "/"
title = "AI Resume Screening System"
version = "1.0.0"
id = "artifacts/resume-screener"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19859
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/resume-screener run dev"

[services.env]
PORT = "19859"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/resume-screener", "run", "build"]
publicDir = "artifacts/resume-screener/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
