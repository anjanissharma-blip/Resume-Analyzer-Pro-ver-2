packages:
  "framer-motion": "For smooth page transitions and beautiful staggered animations on cards and list items"
  "lucide-react": "For crisp, modern icons across the enterprise UI"
  "react-dropzone": "For the drag-and-drop resume upload functionality"
  "date-fns": "For formatting human-readable dates in reports and lists"
  "clsx": "For conditional tailwind class joining"
  "tailwind-merge": "For merging tailwind classes without conflicts"

images:
  - path: "artifacts/resume-screener/public/images/auth-bg.png"
    description: "Abstract minimal geometric background in deep professional slate blue and crisp white, 3D soft shapes, premium enterprise software vibe"
    aspect_ratio: "16:9"
  - path: "artifacts/resume-screener/public/images/empty-state.png"
    description: "A sleek, minimal 3D illustration of a folder and magnifying glass on a pristine white background, representing no data found"
    aspect_ratio: "1:1"

notes:
  - API client hooks are generated by orval in @workspace/api-client-react
  - Using framer-motion for all UI interactivity and depth
  - Wouter used for client-side routing
